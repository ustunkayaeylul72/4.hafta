<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Mama Labirenti - 4. Hafta</title>
    <style>
        :root {
            --primary: #ff00ff;
            /* Neon Pink */
            --secondary: #00ffff;
            /* Cyan */
            --accent: #ffff00;
            /* Yellow */
            --wall: #30336b;
            --wall-glow: #7ed6df;
            --path: #130f40;
            --bg: #0c0d11;
            --glass: rgba(255, 255, 255, 0.1);
            --mama-color: #00d2ff;
            /* Light Blue */
            --border-neon: #ff00ff;
            /* Neon Pink */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 20% 30%, rgba(255, 0, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.05) 0%, transparent 40%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            position: relative;
            padding: 0;
        }

        /* Floating Funny Faces */
        .funny-face {
            position: absolute;
            font-size: 3rem;
            pointer-events: none;
            opacity: 0.3;
            z-index: 0;
            animation: float-face 10s linear infinite;
        }

        @keyframes float-face {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            25% {
                transform: translate(50px, 100px) rotate(90deg);
            }

            50% {
                transform: translate(100px, 0) rotate(180deg);
            }

            75% {
                transform: translate(50px, -100px) rotate(270deg);
            }

            100% {
                transform: translate(0, 0) rotate(360deg);
            }
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .header-section {
            margin-bottom: 5px;
            text-align: center;
        }

        .kedi-frame {
            width: 60px;
            height: 60px;
            margin: 0 auto 5px;
            padding: 4px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 2px solid var(--secondary);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            animation: bounce 3s ease-in-out infinite;
        }

        .kedi-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            font-weight: 800;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            background: var(--secondary);
            color: var(--bg);
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 15px var(--secondary);
        }

        .game-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 4px solid var(--border-neon);
            padding: 10px;
            width: fit-content;
            position: relative;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8), 0 0 30px var(--border-neon);
        }

        #game-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            font-weight: 900;
            text-align: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--secondary);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-val {
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* Maze Board */
        #game-area {
            display: grid;
            grid-template-columns: repeat(19, 18px);
            grid-template-rows: repeat(19, 18px);
            gap: 2px;
            background: var(--bg);
            border: 8px solid var(--wall);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(0, 0, 0, 1);
        }

        .cell {
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .wall {
            background: var(--wall);
            border-radius: 6px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8), 0 0 5px var(--wall-glow);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .path {
            background: transparent;
        }

        .mama {
            font-size: 16px;
            color: var(--mama-color);
            filter: drop-shadow(0 0 8px var(--mama-color));
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(0.8);
            }

            to {
                transform: scale(1.3);
            }
        }

        /* Entities */
        .entity {
            position: absolute;
            width: 18px;
            height: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            z-index: 100;
            transition: all 0.1s linear;
            pointer-events: none;
        }

        .player {
            filter: drop-shadow(0 0 10px var(--accent));
            z-index: 110;
        }

        .monster {
            font-size: 16px;
            filter: drop-shadow(0 0 12px var(--primary));
        }

        #ready-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            color: var(--accent);
            font-weight: 900;
            text-shadow: 0 0 20px black;
            z-index: 150;
            pointer-events: none;
        }

        /* Mobile Controls */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
            width: 240px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: var(--glass);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 28px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            user-select: none;
            transition: 0.1s;
        }

        .ctrl-btn:active {
            background: var(--secondary);
            transform: scale(0.9);
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(12, 13, 17, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            text-align: center;
            padding: 15px;
            border-radius: 40px;
            overflow: hidden;
        }

        .overlay h2 {
            font-size: 2.2rem;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .overlay p {
            font-size: 0.95rem;
            opacity: 0.7;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .selection {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sel-card {
            width: 65px;
            height: 75px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .sel-card.selected {
            border-color: var(--secondary);
            background: rgba(0, 255, 255, 0.1);
            transform: translateY(-10px) rotate(5deg);
        }

        .sel-card i {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        /* NEW CSS */
        .ability-desc {
            margin-top: -5px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--secondary);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            min-height: 20px;
        }

        .difficulty-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 15px;
            width: 100%;
            max-width: 300px;
        }

        .diff-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .diff-row label {
            font-size: 0.85rem;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
        }

        .diff-row input[type=range] {
            accent-color: var(--primary);
            cursor: pointer;
        }

        /* Animations */
        @keyframes flash-level {
            0% {
                background: rgba(255, 255, 255, 0);
            }

            50% {
                background: rgba(255, 255, 255, 0.8);
            }

            100% {
                background: rgba(255, 255, 255, 0);
            }
        }

        .level-flash {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 300;
            animation: flash-level 0.5s ease-out forwards;
        }

        .glitch {
            animation: glitch-anim 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
            color: #fff;
        }

        @keyframes glitch-anim {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-2px, 2px)
            }

            40% {
                transform: translate(-2px, -2px)
            }

            60% {
                transform: translate(2px, 2px)
            }

            80% {
                transform: translate(2px, -2px)
            }

            100% {
                transform: translate(0)
            }
        }

        /* END NEW CSS */

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }

            #game-area {
                grid-template-columns: repeat(19, 16px);
                grid-template-rows: repeat(19, 16px);
                border-width: 4px;
            }

            .cell,
            .entity {
                width: 16px;
                height: 16px;
                font-size: 13px;
            }

            .monster {
                font-size: 15px;
            }
        }
    </style>
</head>

        };

        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('high-score');
        const levelEl = document.getElementById('level');
        const heartsEl = document.getElementById('hearts');
        const gameArea = document.getElementById('game-area');
        const readyEl = document.getElementById('ready-msg');

        highScoreEl.innerText = state.highScore;

        function createBoard() {
            gameArea.innerHTML = '<div id="ready-msg" class="hidden">3</div>';
            state.totalMamas = 0;
            state.collectedMamas = 0;

            mazeMap.forEach((row, r) => {
                row.forEach((type, c) => {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (type === 1) cell.classList.add('wall');
                    else {
                        cell.classList.add('path');
                        if (type === 0) {
                            const mama = document.createElement('span');
                            mama.className = 'mama';
                            mama.innerText = '⭐'; // Neon points
                            mama.id = `mama-${r}-${c}`;
                            cell.appendChild(mama);
                            state.totalMamas++;
                        }
                    }
                    gameArea.appendChild(cell);
                });
            });
        }

        function spawnEntities() {
            // Player
            state.player.r = 15; state.player.c = 9;
            if (!state.player.el) {
                state.player.el = document.createElement('div');
                state.player.el.className = 'entity player';
            }
            state.player.el.innerText = state.selectedChar;
            gameArea.appendChild(state.player.el);
            updatePos(state.player);

            // Monsters (👹)
            state.monsters = [];
            const spawnPoints = [[9, 8], [9, 9], [9, 10], [8, 9], [10, 9], [9, 7]];
            const numMonsters = Math.min(6, state.difficultyMonsters + Math.floor((state.level - 1) * 0.5));
            for (let i = 0; i < numMonsters; i++) {
                const sp = spawnPoints[i % spawnPoints.length];
                const m = {
                    r: sp[0], c: sp[1],
                    el: document.createElement('div'), dir: null
                };
                m.el.className = 'entity monster';
                m.el.innerText = '👹';
                gameArea.appendChild(m.el);
                updatePos(m);
                state.monsters.push(m);
            }
        }

        function updatePos(entity) {
            const size = (window.innerWidth <= 600) ? 16 : 18;
            const gap = (window.innerWidth <= 600) ? 0 : 2;
            entity.el.style.left = (entity.c * (size + gap)) + 'px';
            entity.el.style.top = (entity.r * (size + gap)) + 'px';
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain).connect(audioCtx.destination);

            if (type === 'chomp') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            } else if (type === 'death') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.6);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            }
            osc.start(); osc.stop(audioCtx.currentTime + (type === 'chomp' ? 0.1 : 0.6));
        }

        // BGM System (8-bit style)
        function playBgm() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            stopBgm();

            const notes = [261.63, 196.00, 220.00, 174.61]; // C4, G3, A3, F3
            state.bgmIndex = 0;

            state.bgmInterval = setInterval(() => {
                if (!state.active) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(notes[state.bgmIndex], audioCtx.currentTime);
                gain.gain.setValueAtTime(0.015, audioCtx.currentTime); // Subtle volume
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);

                osc.connect(gain).connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);

                state.bgmIndex = (state.bgmIndex + 1) % notes.length;
            }, 500);
        }

        function stopBgm() {
            clearInterval(state.bgmInterval);
        }

        function updateTheme() {
            const t = themes[(state.level - 1) % themes.length];
            document.documentElement.style.setProperty('--primary', t.p);
            document.documentElement.style.setProperty('--secondary', t.s);
            document.documentElement.style.setProperty('--accent', t.a);
            document.documentElement.style.setProperty('--wall', t.w);
            document.documentElement.style.setProperty('--wall-glow', t.wg);
            document.documentElement.style.setProperty('--border-neon', t.b);
        }

        function canMove(r, c, isMonster = false) {
            if (r < 0 || r >= 19 || c < 0 || c >= 19) return false;
            if (!isMonster && state.selectedChar === '🐸' && state.frogPhasingTimer > 0) return true; // Frog can phase
            return mazeMap[r][c] !== 1;
        }

        function startCountdown() {
            state.monstersReady = false;
            const readyMsg = document.getElementById('ready-msg');
            readyMsg.classList.remove('hidden');
            let count = 5;
            readyMsg.innerText = count;

            const timer = setInterval(() => {
                count--;
                if (count > 0) readyMsg.innerText = count;
                else {
                    readyMsg.classList.add('hidden');
                    state.monstersReady = true;
                    clearInterval(timer);
                }
            }, 1000);
        }

        function gameStep() {
            if (!state.active) return;

            // Frog Cooldowns
            if (state.selectedChar === '🐸') {
                if (state.frogPhasingTimer > 0) {
                    state.frogPhasingTimer -= 100;
                    if (state.frogPhasingTimer <= 0) state.player.el.style.opacity = '1';
                }
                if (state.frogCooldownTimer > 0) state.frogCooldownTimer -= 100;
            }

            // Player logic
            if (state.player.nextDir) {
                let nr = state.player.r, nc = state.player.c;
                if (state.player.nextDir === 'up') nr--;
                if (state.player.nextDir === 'down') nr++;
                if (state.player.nextDir === 'left') nc--;
                if (state.player.nextDir === 'right') nc++;

                // Trigger Frog Phasing if hitting a wall and ready
                if (state.selectedChar === '🐸' && mazeMap[nr] && mazeMap[nr][nc] === 1 && state.frogCooldownTimer <= 0 && state.frogPhasingTimer <= 0) {
                    state.frogPhasingTimer = 2000;
                    state.frogCooldownTimer = 10000;
                    state.player.el.style.opacity = '0.5';
                    playSfx('chomp'); // small feedback
                }

                if (canMove(nr, nc)) state.player.curDir = state.player.nextDir;
            }

            if (state.player.curDir) {
                let nr = state.player.r, nc = state.player.c;
                if (state.player.curDir === 'up') nr--;
                if (state.player.curDir === 'down') nr++;
                if (state.player.curDir === 'left') nc--;
                if (state.player.curDir === 'right') nc++;

                if (canMove(nr, nc)) {
                    state.player.r = nr; state.player.c = nc;
                    updatePos(state.player);
                    checkCollisions();
                } else {
                    // Make sure we aren't stuck in a wall if phasing ended
                    if (state.selectedChar === '🐸' && mazeMap[state.player.r][state.player.c] === 1 && state.frogPhasingTimer <= 0) {
                        handleDeath(); // Died inside wall
                    }
                }
            }

            // Monsters logic (Move every 3 steps to be slightly faster but still manageable)
            if (state.monstersReady && state.frameCount % 3 === 0) {
                state.monsters.forEach(m => {
                    moveMonster(m);
                    updatePos(m);
                });
            }

            state.frameCount++;
            checkCollisions();

            if (state.active) {
                let baseSpeedMs = { 1: 250, 2: 200, 3: 150 }[state.difficultySpeed] || 200;

                // Cat is 20% faster
                if (state.selectedChar === '🐱') baseSpeedMs *= 0.8;

                // Level speed decrease
                let levelSpeedReducer = state.level * 10;
                // Bird mitigates speed decrease at higher levels
                if (state.selectedChar === '🐦') levelSpeedReducer = state.level * 3;

                let stepSpeed = Math.max(80, baseSpeedMs - levelSpeedReducer);
                setTimeout(gameStep, stepSpeed);
            }
        }

        function moveMonster(m) {
            const dirs = ['up', 'down', 'left', 'right'];
            let bestDir = m.dir;

            // AI prefers moving towards player but respects maze center exit
            if (m.r === 9 && (m.c >= 8 && m.c <= 10)) { // In the house?
                bestDir = 'up'; // Move up to exit center
            } else if (Math.random() < 0.3) {
                if (state.player.r < m.r && canMove(m.r - 1, m.c, true)) bestDir = 'up';
                else if (state.player.r > m.r && canMove(m.r + 1, m.c, true)) bestDir = 'down';
                else if (state.player.c < m.c && canMove(m.r, m.c - 1, true)) bestDir = 'left';
                else if (state.player.c > m.c && canMove(m.r, m.c + 1, true)) bestDir = 'right';
            }

            if (!bestDir || !canMoveInDir(m, bestDir)) {
                const validDirs = dirs.filter(d => canMoveInDir(m, d));
                bestDir = validDirs[Math.floor(Math.random() * validDirs.length)];
            }

            if (bestDir === 'up') m.r--;
            if (bestDir === 'down') m.r++;
            if (bestDir === 'left') m.c--;
            if (bestDir === 'right') m.c++;
            m.dir = bestDir;
        }

        function canMoveInDir(e, dir) {
            let nr = e.r, nc = e.c;
            if (dir === 'up') nr--;
            if (dir === 'down') nr++;
            if (dir === 'left') nc--;
            if (dir === 'right') nc++;
            return canMove(nr, nc, true); // True means it's a monster
        }

        function checkCollisions() {
            const mama = document.getElementById(`mama-${state.player.r}-${state.player.c}`);
            if (mama) {
                mama.remove();
                state.score += 20;
                state.collectedMamas++;
                scoreEl.innerText = state.score;
                if (state.collectedMamas >= state.totalMamas) levelUp();
            }

            if (state.monstersReady) {
                state.monsters.forEach(m => {
                    if (m.r === state.player.r && m.c === state.player.c) handleDeath();
                });
            }
        }

        function handleDeath() {
            state.lives--;
            playSfx('death');
            stopBgm();
            state.active = false;
            heartsEl.innerText = '❤️'.repeat(Math.max(0, state.lives));
            if (state.lives > 0) {
                setTimeout(() => {
                    state.active = true;
                    state.player.r = 15; state.player.c = 9;
                    updatePos(state.player);
                    startCountdown();
                    playBgm();
                    gameStep();
                }, 1500);
            } else gameOver();
        }

        function levelUp() {
            state.level++;
            levelEl.innerText = state.level;
            state.active = false;
            stopBgm();

            // Level Up Effects
            updateTheme();
            const flash = document.createElement('div');
            flash.className = 'level-flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 600);

            createBoard();
            spawnEntities();
            setTimeout(() => {
                state.active = true;
                startCountdown();
                playBgm();
                gameStep();
            }, 1000);
        }

        function startGame() {
            state.score = 0; state.level = 1;

            // Apply difficulty settings
            state.difficultySpeed = parseInt(document.getElementById('slider-speed').value);
            state.difficultyMonsters = parseInt(document.getElementById('slider-monsters').value);

            // Apply Hamster Extra Life
            state.lives = state.selectedChar === '🐹' ? 4 : 3;

            scoreEl.innerText = '0';
            levelEl.innerText = '1';
            heartsEl.innerText = '❤️'.repeat(state.lives);

            // Reset timers and UI
            state.frogCooldownTimer = 0; state.frogPhasingTimer = 0;
            updateTheme();

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            createBoard();
            spawnEntities();
            state.active = true;
            startCountdown();
            playBgm();
            gameStep();
        }

        function gameOver() {
            state.active = false;
            stopBgm();
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('mazeHighScoreNeon', state.highScore);
                highScoreEl.innerText = state.highScore;
            }
            document.getElementById('final-score').innerText = state.score;
            document.getElementById('game-over-screen').classList.remove('hidden');
        }

        window.addEventListener('keydown', e => {
            if (['ArrowUp', 'w'].includes(e.key)) state.player.nextDir = 'up';
            if (['ArrowDown', 's'].includes(e.key)) state.player.nextDir = 'down';
            if (['ArrowLeft', 'a'].includes(e.key)) state.player.nextDir = 'left';
            if (['ArrowRight', 'd'].includes(e.key)) state.player.nextDir = 'right';
        });

        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.onmousedown = () => state.player.nextDir = btn.dataset.dir;
            btn.ontouchstart = (e) => { e.preventDefault(); state.player.nextDir = btn.dataset.dir; };
        });

        document.querySelectorAll('.sel-card').forEach(card => {
            card.onclick = () => {
                document.querySelectorAll('.sel-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                state.selectedChar = card.dataset.char;
                document.getElementById('ability-text').innerText = abilitiesMap[state.selectedChar];
            };
        });

        // Difficulty Sliders
        const sliderSpeed = document.getElementById('slider-speed');
        const valSpeed = document.getElementById('val-speed');
        const speedLabels = ['Yavaş', 'Normal', 'Hızlı'];
        sliderSpeed.oninput = () => valSpeed.innerText = speedLabels[sliderSpeed.value - 1];

        const sliderMonsters = document.getElementById('slider-monsters');
        const valMonsters = document.getElementById('val-monsters');
        sliderMonsters.oninput = () => valMonsters.innerText = sliderMonsters.value;

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('restart-btn').onclick = () => {
            document.getElementById('start-screen').classList.remove('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
        };

    </script>
</body>

</html>
